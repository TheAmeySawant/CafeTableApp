<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar (Transactional Hide/Simplify) -->
<header class="fixed top-0 w-full z-50 bg-[#fdf9f2] flex justify-center items-center px-6 py-8">
<h1 class="font-headline font-bold italic text-2xl tracking-tight text-on-surface">The Roasted Bean</h1>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-24 pb-12">
<div class="w-full max-w-md space-y-12">
<!-- Editorial Header Section -->
<section class="space-y-4 text-center">
<div class="relative inline-block mb-6">
<div class="w-24 h-24 rounded-full overflow-hidden mx-auto shadow-xl shadow-on-surface/5">
<img alt="The Roasted Bean Experience" class="w-full h-full object-cover" data-alt="Close-up of steam rising from a freshly poured cup of artisan espresso in a dark ceramic mug, morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmkmerxsiPS2LN2CzI_BbN5wu6N_O-O2YSj_aIOVI6nNVW1_9sVXPN0q5WJgR7X0rLNpg0OB34h7_s2gOVy8TKcqcPA6-EoDE1ZJOHlAMfUQn3bUJPphmeT6axqZ0J3f21kKa4bIMo5R2enVdhkfqGJSI9nYuNvXzLYopb4m51g-bYI2n8wDzYdi9tg0ZegsY_l1lj5OXJAxPnfnXKIqBDJQMPVFXFUJcSYPz-Y7EmXfPUnOGTYFUrS3w7YBoB5ncyMvSKf5v6Lf8"/>
</div>
<div class="absolute -bottom-2 -right-2 bg-primary text-on-primary p-2 rounded-full shadow-lg">
<span class="material-symbols-outlined text-sm">coffee</span>
</div>
</div>
<h2 class="font-headline text-5xl font-bold tracking-tight text-on-surface">Welcome Back</h2>
<p class="font-body text-on-surface-variant/80 text-lg max-w-xs mx-auto leading-relaxed">
          Enter your email or phone number to continue
        </p>
</section>
<!-- Input Section -->
<form class="space-y-8">
<div class="relative group">
<label class="block text-xs font-label uppercase tracking-widest text-primary mb-2 transition-all group-focus-within:font-bold" for="login-input">Email or Phone</label>
<input class="w-full bg-transparent border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 py-4 px-0 text-xl font-body placeholder:text-on-surface/20 transition-colors" id="login-input" placeholder="e.g. hello@roastedbean.com" type="text"/>
</div>
<div class="space-y-4 pt-4">
<button class="w-full bg-primary text-on-primary font-label font-bold py-5 rounded-full shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
            Send OTP
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="flex items-center gap-4 py-2">
<div class="flex-grow h-px bg-surface-container-highest"></div>
<span class="text-xs font-label text-outline-variant uppercase tracking-widest">or</span>
<div class="flex-grow h-px bg-surface-container-highest"></div>
</div>
<button class="w-full bg-surface-container-low text-primary font-label font-semibold py-4 rounded-full border border-transparent hover:bg-surface-container-high transition-colors active:scale-[0.98]" type="button">
            Guest Checkout
          </button>
</div>
</form>
<!-- Asymmetric Decorative Element -->
<div class="pt-12 text-center opacity-40">
<div class="font-headline italic text-on-surface-variant flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[10px]">colors_spark</span>
<span class="text-sm">Finest Roasts Delivered</span>
</div>
</div>
</div>
</main>
<!-- Footer / Legal (Subtle) -->
<footer class="pb-8 px-6 text-center">
<p class="text-[10px] font-label uppercase tracking-widest text-on-surface/30">
      By continuing, you agree to our <a class="underline hover:text-primary" href="#">Terms</a> and <a class="underline hover:text-primary" href="#">Privacy Policy</a>
</p>
</footer>
<!-- Contextual Visual - Overlap Style -->
<div class="hidden lg:block fixed right-0 bottom-0 w-1/3 h-full overflow-hidden pointer-events-none z-0">
<div class="w-full h-full bg-surface-container-low relative">
<img class="absolute inset-0 w-full h-full object-cover opacity-20 grayscale mix-blend-multiply" data-alt="Interior of a high-end specialty coffee shop with warm wood textures, copper brewing equipment, and soft editorial lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA3InrWAehxa7T1DYItgeF1Pdfl9KhWi5DM0w8DCggRoa8fMo4hU2s_3n_1Ky3YRVIhoAkq522NdXBOlUCQOseVpGb44woVzpsUX6dvcoViBDrvfgLRNjXzDk4BojoGSM081r3v_oulkK1_B9RV2_G4nsoaMIYufOqI02-3Ie5lDftit1yKmFBtxZMrdaPzS6_wfP2iCQb6r4xEItNPkKohLSkYPZtdPBQ0sw50ne2F3YcmT0Oc9xNZfaX3RVllcSIREhWreNXZhbQ"/>
<div class="absolute inset-0 bg-gradient-to-l from-transparent to-surface"></div>
</div>
